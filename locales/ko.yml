# Acknowledgements page content
acknowledgements:
  title: "{name} 감사의 글" # Title of the acknowledgements page
  intro: "{name}는 기여자들, 멋진 오픈 소스 프로젝트들, 그리고 믿을 수 없을 정도로 지지해 주는 커뮤니티 없이는 존재할 수 없었습니다. 특히 다음 분들께 감사드립니다:" # Introductory text for the acknowledgements page
  s2protTitle: icza / s2prot # Header for s2prot acknowledgement
  s2protBody: "icza의 s2prot (Apache 2.0)은 {name}의 고성능 리플레이 데이터 추출 작업의 중요한 토대로 사용되었습니다." # Description of s2prot acknowledgement
  vueTitle: Vue.js 및 Vue-i18n # Header for frontend framework acknowledgement
  vueBody: "저희 프론트엔드는 Vue.js와 Vue-i18n (MIT 라이선스)으로 구동됩니다." # Description of Vue acknowledgement
  dataTitle: Valkey 및 PostgreSQL # Header for data stack acknowledgement
  dataBody: "Valkey와 PostgreSQL 프로젝트의 유지관리자들께 감사드립니다. 그들의 작업은 {name}의 데이터 모델과 처리 파이프라인의 기반입니다." # Description of Valkey/PostgreSQL acknowledgement
  goTitle: Go # Header for Go acknowledgement
  goBody: "Go와 그 생태계는 {name} 뒤에 있는 고처리량 리플레이 처리 및 API 서비스를 실용적으로 구축할 수 있게 해줍니다." # Description of Go acknowledgement
  viteTitle: Vite # Header for Vite acknowledgement
  viteBody: "Vite는 프론트엔드 빌드 및 개발 워크플로우를 충분히 빠르게 유지하여 정신을 잃지 않고 신속하게 반복할 수 있게 해줍니다." # Description of Vite acknowledgement
  aligulacTitle: Aligulac # Header for Aligulac acknowledgement
  aligulacBody: "Aligulac은 라이브 선수 레이팅을 제공하는 데 사용되며, 사용자에게 선수에 대한 유용한 정보를 표시하는 능력을 크게 향상시켜 줍니다." # Description of Aligulac acknowledgement
  usersTitle: 사용자 및 베타 테스터 # Header for community acknowledgement
  usersBody: "무엇보다도 {name}를 사용하는 모든 분들과 솔직한 피드백, 버그 보고, 인내심으로 프로젝트를 더 좋게 만들어 주시는 모든 베타 테스터분들께 감사드립니다." # Description of user acknowledgement
  closing: "저희는 이와 같은 프로젝트를 가능하게 하는 모든 유지관리자, 기여자, 커뮤니티 구성원의 노고에 감사드립니다." # Closing text for the acknowledgements page

