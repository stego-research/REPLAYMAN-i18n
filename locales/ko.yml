# FAQ page content
faq:
  title: "{name} FAQ" # Main title of the FAQ page
  q1: "{name}가 무엇인가요?"
  a1: "{name}는 게임 리플레이를 관리하고 분석하기 위해 설계된 플랫폼입니다. 리플레이를 업로드하고, 상세한 통계와 통찰력을 확인하며, 게임 컬렉션을 검색할 수 있습니다."
  q2: "{name}는 어떤 리플레이를 지원하나요?"
  a2: "현재 {name}는 스타크래프트 II: 공허의 유산 (v5.0.0 이상) 1v1 리플레이만 지원합니다."
  q3: "{name}는 무료인가요?"
  a3_1: "솔직히 말씀드리면, 향후 유료 옵션이 생길 예정입니다. 하지만 현재 프리뷰 단계에서 보시는 모든 핵심 기능은 무료로 유지되기를 바라며, Oracle 분석이나 업로드와 같은 일부 기능에는 더 엄격한 제한이 적용될 수 있습니다. 아직 발표되지 않은 일부 기능은 향후 유료 구독자만 사용할 수 있을 것입니다. 플랫폼 운영에 상당한 비용이 들고 구축하는 데 오랜 시간이 걸렸기 때문에 기부금에만 의존할 수는 없습니다."
  a3_2: "무료 기능을 즐기시길 바라며, 유료 기능이 출시되었을 때 그 가치가 충분하기를 바랍니다."
  q4: "{name}를 어떻게 사용하나요? 계정이 필요한가요?"
  a4: "{name}를 둘러보는 데 계정은 필요하지 않습니다. 하지만 리플레이 업로드 및 다운로드와 같은 일부 기능은 익명 사용자에게 엄격히 제한됩니다."
  q5: "계정은 어떻게 만드나요?"
  a5: "'로그인 / 회원가입' 버튼을 누르기만 하면 됩니다. 계정이 없더라도 비밀번호 없이 코드를 통해 즉시 계정을 만들고 로그인할 수 있습니다!"
  q6: "리플레이를 비공개로 유지할 수 있나요?"
  a6: "계정이 있는 경우, 업로드 페이지의 '업로드된 리플레이를 공개 검색 결과에 표시' 옵션을 사용하여 공개 여부를 제어할 수 있습니다. 익명 사용자의 업로드는 항상 공개 검색이 가능합니다."
  q7: "{name}는 어떤 종류의 분석을 제공하나요?"
  a7: "짧게 말씀드리면 아주 많습니다. 프리뷰 기간 이후 더 많은 기능이 추가될 예정입니다. {name}는 거의 즉시 리플레이를 추출하고 분석하여 빌드 오더, 자원 소비, 벤치마크 데이터 및 선수 성적에 대한 통찰력을 제공합니다. ORACLE 기능은 머신러닝 분석을 사용하여 게임 전체의 승리 가능성을 예측하므로 어디서 형세가 바뀌었는지 확인할 수 있습니다."
  q8: "리플레이를 다운로드할 수 있나요? 리플레이 팩은요?"
  a8: "공개된 리플레이 파일이나 링크가 있는 파일을 다운로드할 수 있습니다. 계정이 있는 사용자는 현재 최대 20개의 리플레이를 포함하는 zip 파일 팩을 만들 수 있습니다."
  q9: "{name} 프리뷰 버전에서 무엇을 기대할 수 있나요?"
  a9_p1: "이것은 {name}의 초기 버전이며 여러 면에서 미흡할 수 있습니다. 다음 사항을 유의해 주세요:"
  a9_li1: "버그, 예기치 않은 동작 또는 충돌이 발생할 수 있습니다."
  a9_li2: "데이터(업로드된 리플레이 또는 분석 결과 포함)가 예기치 않게 사라지거나 변경될 수 있습니다."
  a9_li3: "플랫폼이 100% 신뢰할 수 있거나 정확하지 않을 수 있습니다. 플랫폼 개선을 위한 여러분의 이해와 인내에 감사드립니다! 이 단계에서의 피드백은 매우 소중합니다."
  q10: "피드백이나 질문은 어디에 공유하나요?"
  a10: "GitHub 이슈 페이지를 확인하거나 Discord 커뮤니티에 참여해 주세요. 페이지 좌측 상단에서 링크를 찾으실 수 있습니다."
  q11: "다른 언어는 지원되나요?"
  a11: "여러 언어로 출시하고자 준비 중입니다. 스페인어, 중국어, 한국어를 사용하신다면 번역에 도움을 주실 수 있으니 계속 연락해 주세요."
  q12: "라이트 모드는요?"
  a12: "디자인이 괜찮아 보이는 대로 출시할 예정입니다."

