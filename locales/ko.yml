# Home page content
home:
  welcome: "{name} 베타에 오신 것을 환영합니다." # Main welcome message on the home page
  glad: 단순한 리플레이 관리자를 넘어선, 세계에서 가장 진보된 경쟁전 SC2 플랫폼입니다. # Sub-heading on the home page
  p1: '{name}는 게이머, 크리에이터, 토너먼트 운영자, 게임 개발자 등에게 지능적인 데이터 통찰력을 제공하기 위해 Stego Research에서 개발 중인 일련의 기술 중 일부입니다.' # First paragraph of home page description
  p2: "" # Removed
  p3: '{name}는 현재 오픈 베타 버전입니다. 문서와 기능 세트는 제한적이지만, 플랫폼을 탐색하고 활용할 수 있는 모든 강력한 방법을 발견하시길 바랍니다. Discord 커뮤니티에 참여하여 피드백을 주시는 것을 강력히 추천합니다. 페이지 좌측 상단에서 Discord 링크를 찾으실 수 있습니다.' # Third paragraph regarding availability
  p4: 자, 이제 리플레이를 확인하러 가보시죠! # Call to action at the end of the home page
  showReplaysCta: 리플레이 보기! # Home page CTA button label
  footer: Stego Research # !! DON'T EDIT Signature in the footer of the home page
  featuresTitle: 가장 진보된 SC2 기술로 실력을 향상시키세요.
  oracleTitle: ORACLE ML 예측
  oracleP1: 세계에서 가장 진보된 StarCraft 분석. 4,000만 개 이상의 게임 포지션으로 훈련된 머신러닝 모델이 선수들의 미묘한 이점을 밝혀냅니다.
  oracleP2: 어느 시점에서나 즉각적인 결과 예측을 확인하세요 - 실제 ML 추론으로 구축되었습니다.
  oracleCta: ORACLE 작동 보기
  promotionTitle: 글로벌 선수 랭킹
  promotionP1: 원조 랭킹 사이트가 업그레이드되었습니다. 자매 사이트인 {aligulac}의 신뢰할 수 있는 레이팅으로 상위 선수들을 추적하세요.
  promotionCta: 리더보드 찾아보기
  timeWarpTitle: 고해상도 미니맵
  timeWarpP1: 리플레이가 빨리 감기기를 기다릴 필요가 없습니다. 즉시 게임의 어느 지점으로든 이동하여 결정론적 엔진을 통해 모든 유닛의 위치를 정확히 확인하세요.
  timeWarpCta: 직접 시도해보기
  replaysTitle: 최근 리플레이 활동
  replaysP1: 플랫폼 전체의 최신 게임을 탐색하세요. 선수, 종족 또는 매치업별로 필터링하여 원하는 것을 정확히 찾으세요.
  replaysCta: 데이터베이스 탐색


