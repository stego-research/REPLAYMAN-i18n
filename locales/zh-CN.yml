# FAQ page content
faq:
  title: '{name} 常见问题' # Main title of the FAQ page
  q1: "{name} 是什么？"
  a1: "{name} 是一个为管理和分析游戏回放而设计的平台。它允许您上传回放，查看详细的统计数据和见解，并在游戏库中搜索。"
  q2: "{name} 支持哪些回放？"
  a2: "目前，{name} 仅支持《星际争霸II：虚空之遗》（5.0.0 及更高版本）的 1v1 回放。"
  q3: "{name} 是免费使用的吗？"
  a3_1: "我不打算掩饰现实：未来会有付费选项。但是，我们希望在预览阶段保留您今天看到的所有核心功能免费使用，尽管 Oracle 分析和上传等某些功能可能会受到更严格的限制。一些尚未宣布的功能未来可能仅对付费订阅者开放。现实情况是，该平台的运行成本很高，且花费了数月时间构建，我们不想仅依靠捐赠。"
  a3_2: "我们希望您喜欢这些免费功能，并在付费功能推出时发现它们物有所值。"
  q4: "我如何使用 {name}？我需要账号吗？"
  a4: "浏览 {name} 不需要账号。但是，某些功能对匿名用户有严格限制，例如回放上传和下载。"
  q5: "我如何注册账号？"
  a5: "只需点击“登录 / 注册”按钮 - 如果您还没有账号，您可以立即创建一个并仅凭验证码登录，这里不需要密码！"
  q6: "我可以将回放设为私有吗？"
  a6: "如果您有账号，您可以在上传页面使用“允许上传的回放在公开搜索中显示”选项来控制您的上传是否公开显示。匿名用户的上传始终可以被公开搜索。"
  q7: "{name} 提供什么样的分析？"
  a7: "简短的回答是，很多，而且在预览窗口之后还会推出更多。{name} 可以几乎瞬间提取并分析回放，提供关于建筑顺序、资源消耗、基准数据和选手表现的见解。ORACLE 功能使用机器学习分析来预测整个游戏过程中最可能的获胜者，这样您就可以看到局势是在哪里发生转变的。"
  q8: "我可以下载回放吗？回放包呢？"
  a8: "您可以下载任何公开可用的回放文件，或您获得链接的任何文件。有账号的用户目前可以创建包含最多 20 个回放的 zip 文件包。"
  q9: "我对这个 {name} 预览版应该有什么预期？"
  a9_p1: "这是 {name} 的一个非常早期的版本，在很多方面都还不够完善。请记住："
  a9_li1: "您可能会遇到错误、异常行为或崩溃。"
  a9_li2: "数据（包括您上传的回放或分析结果）可能会丢失或发生意外更改。"
  a9_li3: "该平台不被预期为 100% 可靠或准确。感谢您在我们改进平台过程中的理解和耐心！您在此阶段的反馈是无价的。"
  q10: "我在哪里分享反馈或提问？"
  a10: "欢迎查看我们的 GitHub issues 页面或加入我们的 Discord 社区。您可以在页面左上角找到这些链接。"
  q11: "其他语言支持吗？"
  a11: "我们计划推出多种语言版本，请保持关注。如果您会说西班牙语、中文或韩语，我们需要您在翻译方面的帮助，请保持联系。"
  q12: "浅色模式呢？？？？？"
  a12: "等我能让它看起来不那么糟糕的时候就会推出。"

