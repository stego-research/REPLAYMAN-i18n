# FAQ page content
faq:
  title: 'Preguntas Frecuentes de {name}' # Main title of the FAQ page
  q1: ¿Qué es {name}?
  a1: "{name} es una plataforma diseñada para gestionar y analizar repeticiones de juegos. Te permite subir tus repeticiones, ver estadísticas e información detallada, y buscar en una colección de partidas."
  q2: "¿Qué tipo de repeticiones soporta {name}?"
  a2: "Actualmente, {name} solo soporta repeticiones 1v1 de StarCraft II de Legacy of the Void (ver. 5.0.0 y más recientes)."
  q3: "¿Es {name} gratuito?"
  a3_1: "No te voy a ocultar la realidad: habrá opciones de pago en el futuro. Sin embargo, esperamos mantener gratuitas todas las funciones principales que ves hoy en la fase de vista previa, aunque algunas funciones como el análisis de Oracle y las subidas pueden estar sujetas a límites más estrictos. Algunas funciones que aún no se han anunciado probablemente estarán disponibles solo para suscriptores de pago en el futuro. La realidad es que la plataforma cuesta bastante de operar y tomó muchos meses construirla, y preferiríamos no depender solo de donaciones."
  a3_2: "Esperamos que disfrutes de las funciones gratuitas y que encuentres que las funciones de pago valen la pena cuando lleguen."
  q4: "¿Cómo uso {name}? ¿Necesito una cuenta?"
  a4: "No se requiere una cuenta para navegar por {name}. Sin embargo, algunas funciones están estrictamente limitadas para usuarios anónimos, como las subidas y descargas de repeticiones."
  q5: "¿Cómo me registro para obtener una cuenta?"
  a5: "Simplemente pulsa el botón 'iniciar sesión / registrarse' - si aún no tienes una cuenta, podrás crear una inmediatamente e iniciar sesión solo con un código, ¡nada de contraseñas por aquí!"
  q6: "¿Puedo mantener mis repeticiones en privado?"
  a6: "Si tienes una cuenta, puedes controlar si tus subidas aparecen en los resultados de búsqueda pública usando la opción 'Permitir que las repeticiones subidas aparezcan en búsquedas públicas' en la página de subida. Las subidas de usuarios anónimos siempre se pueden buscar públicamente."
  q7: "¿Qué tipo de análisis proporciona {name}?"
  a7: "La respuesta corta es, mucho, y vendrá mucho más después de esta ventana de vista previa. {name} puede extraer y analizar repeticiones de forma casi instantánea para proporcionar información sobre órdenes de construcción, gasto, datos de referencia y rendimiento de los jugadores. La función ORACLE utiliza el análisis de aprendizaje automático para predecir los ganadores más probables durante toda la partida para que puedas ver dónde cambió la tendencia."
  q8: "¿Puedo descargar repeticiones? ¿Qué hay de los packs de repeticiones?"
  a8: "Puedes descargar cualquier archivo de repetición disponible públicamente, o cualquier archivo al que se te haya enlazado. Los usuarios con cuenta pueden crear actualmente packs de archivos zip de hasta 20 repeticiones."
  q9: "¿Qué debo esperar de esta versión de vista previa de {name}?"
  a9_p1: "Esta es una versión muy temprana de {name}, y está absolutamente rota en varios sentidos. Por favor, ten esto en cuenta:"
  a9_li1: "Puedes encontrar errores, comportamientos inesperados o bloqueos."
  a9_li2: "Los datos (incluyendo tus repeticiones subidas o resultados de análisis) pueden perderse o cambiar inesperadamente."
  a9_li3: "No se espera que la plataforma sea 100% confiable o precisa. ¡Agradecemos tu comprensión y paciencia mientras trabajamos para mejorar la plataforma! Tu feedback durante esta fase es inestimable."
  q10: "¿Dónde comparto mis comentarios o preguntas?"
  a10: "No dudes en consultar nuestra página de problemas en GitHub o unirte a nuestra comunidad de Discord. Puedes encontrar enlaces a estos en la parte superior izquierda de la página."
  q11: "¿Qué pasa con otros idiomas?"
  a11: "Queremos lanzar en múltiples idiomas, así que mantente atento. Si hablas español, chino o coreano, podríamos usar tu ayuda con las traducciones, así que por favor mantente en contacto."
  q12: "¿Modo claro?????"
  a12: Vendrá cuando pueda hacer que se vea menos mal.

