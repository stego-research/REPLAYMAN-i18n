# Home page content
home:
  welcome: Bienvenido a la beta de {name}. # Main welcome message on the home page
  glad: Es más que un simple gestor de repeticiones. Es la plataforma más avanzada del mundo para SC2 competitivo. # Sub-heading on the home page
  p1: '{name} es parte de una serie de tecnologías en desarrollo por Stego Research para proporcionar información inteligente de datos a jugadores, creadores, organizadores de torneos, desarrolladores de juegos y más.' # First paragraph of home page description
  p2: "" # Removed
  p3: '{name} se encuentra actualmente en beta abierta. Aunque la documentación y el conjunto de funciones son limitados, esperamos que disfrutes explorando la plataforma y descubriendo todas las formas poderosas en que se puede utilizar. Recomiendo encarecidamente unirse a nuestra comunidad de Discord para participar y enviarnos tus comentarios. Puedes encontrar enlaces al Discord en la parte superior izquierda de la página.' # Third paragraph regarding availability
  p4: ¡Ahora que las presentaciones han terminado, ve a echar un vistazo a algunas repeticiones! # Call to action at the end of the home page
  showReplaysCta: ¡MUÉSTRAME LAS REPETICIONES! # Home page CTA button label
  footer: Stego Research # !! DON'T EDIT Signature in the footer of the home page
  featuresTitle: Sube de rango con la tecnología de SC2 más avanzada de internet.
  oracleTitle: Predicciones ORACLE ML
  oracleP1: El análisis de StarCraft más avanzado del mundo. Nuestros modelos de aprendizaje automático entrenados en más de 40.000.000 de posiciones de juego revelan nuevas perspectivas sobre las sutiles ventajas de los jugadores.
  oracleP2: Obtén predicciones de resultados instantáneas en cualquier momento, todo construido con inferencia de ML real, sin tonterías.
  oracleCta: Ver ORACLE en acción
  promotionTitle: Clasificaciones globales de jugadores
  promotionP1: El sitio original de clasificaciones, mejorado. Sigue a los mejores jugadores con calificaciones confiables de nuestro sitio hermano, {aligulac}.
  promotionCta: Explorar la tabla de clasificación
  timeWarpTitle: Minimapa de alta fidelidad
  timeWarpP1: Se acabó el esperar a que las repeticiones se adelanten. Ve a cualquier punto de la partida al instante y mira exactamente dónde está cada unidad con nuestro motor determinista.
  timeWarpCta: Pruébalo tú mismo
  replaysTitle: Actividad reciente de repeticiones
  replaysP1: Explora las últimas partidas de toda la plataforma. Filtra por jugador, raza o enfrentamiento para encontrar exactamente lo que buscas.
  replaysCta: Explorar la base de datos


