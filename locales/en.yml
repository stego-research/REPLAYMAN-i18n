# Navigation menu items
nav:
  upload: upload # Link to the upload page
  players: players # Link to the player search page
  replays: replays # Link to the replay search page
  myReplays: my replays # Link to the user's personal replays (only shown when logged in)
  faq: faq # Link to the FAQ page
  admin: admin # Link to the admin dashboard (only shown to admins)
  login: log in / sign up # Button to open login/signup panel
  logout: logout # Button to log out the current user

# Home page content
home:
  welcome: Welcome to the {name} beta. # Main welcome message on the home page
  glad: REPLAYMAN is much, much more than just a replay manager. # Sub-heading on the home page
  p1: '{name} is part of a suite of technologies under development by Stego Research
    to provide intelligent data insights to gamers, creators, tournament organizers,
    game developers, and more.' # First paragraph of home page description
  p2: We're building the world's most powerful tools for strategy game lovers. # Second paragraph
  p3: '{name} is currently in open beta. While the documentation and feature set are limited, we hope
    you enjoy exploring the platform and discovering all the powerful ways it can be used. I highly recommend joining
    our Discord community to get involved and provide feedback. You can find links to the Discord in the top left of
    the page.' # Third paragraph regarding availability
  p4: Now that our introduction is out of the way, go check out some replays! # Call to action at the end of the home page
  showReplaysCta: SHOW ME THE REPLAYS! # Home page CTA button label
  footer: Stego Research # !! DON'T EDIT Signature in the footer of the home page
  featuresTitle: Rank up with the most advanced SC2 technology on the internet.
  oracleTitle: ORACLE AI Insights
  oracleP1: Experience the next generation of StarCraft analysis with ORACLE. Our machine-learning models provide deep, context-aware insights, uncovering the subtle strategic shifts that define high-level play.
  oracleP2: Get instant, data-driven predictions on win probabilities and economic outcomes based on real-time game state analysis.
  oracleCta: See Oracle in Action
  searchTitle: Next-Level Search
  searchP1: Dive deep into our massive replay database. Analyze high-level games and discover the favorite build orders of every top player you can imagine.
  searchP2: Try searching by just about anything. Your favorite player, nation, matchup, race, map, even build order.
  searchP3: Manage your favorites or download replays right from the results list.
  searchCta: Browse Replays
  buildTitle: Build Order Mastery
  buildP1: Explore a vast, searchable library of build orders from every matchup. Export directly to SALT format and perfect your early game with the exact sequences used by the pros.
  buildCta: Explore Builds
  packTitle: Custom Replay Packs
  packP1: Curation made easy. Build your own custom replay packs, organize your training sessions, and share curated sets of games with your team or students with just a few clicks.
  packCta: Manage your replays
  promotionTitle: Snag That Promotion
  promotionP1: Study better with advanced, ultra-fast replay analysis and statistics. Compare yourself to all players, or learn just how far you are from the pros. Set goals, and execute.
  promotionCta: Check out a replay
  timeWarpTitle: Travel through Time
  timeWarpP1: No more coffee breaks waiting for your replay to fast-forward. We process your replay in a fraction of a second, and with TIME WARP you can travel to any point in time in the game instantly, across all of our tools.
  timeWarpCta: Try it yourself


