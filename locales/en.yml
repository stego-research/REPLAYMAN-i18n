# FAQ page content
faq:
  title: '{name} FAQ' # Main title of the FAQ page
  q1: What is {name}?
  a1: '{name} is a platform designed for managing and analyzing game replays. It allows you to upload your replays, see detailed statistics and insights, and search across a collection of games.'
  q2: "What kind of replays does {name} support?"
  a2: "Currently, {name} only supports 1v1 StarCraft II replays from Legacy of the Void (ver. 5.0.0 and newer)."
  q3: "Is {name} free to use?"
  a3_1: "I won't sugar-coat the reality: there will be paid options in the future. However, we hope to keep all the core features you see today in the preview phase free to use, although some features like Oracle analysis and uploads may be subject to tighter limits. Some features that have not yet been announced will likely only be available to paid subscribers in the future. The reality is that the platform costs quite a bit to operate and took many months to build, and we'd rather not rely on donations alone."
  a3_2: "We hope you enjoy the free features and that you find the paid features to be worth the value when they arrive."
  q4: "How do I use {name}? Do I need an account?"
  a4: "No account is required to browse {name}. However, some features are strictly limited for anonymous users, such as replay uploads and downloads."
  q5: "How do I sign up for an account?"
  a5: "Simply hit the 'log in / sign up' button - if you don't already have an account, you'll be able to create one immediately and log in with just a code, no passwords around here!"
  q6: "Can I keep my replays private?"
  a6: "If you have an account, you can control whether your uploads appear in public search results using the 'Allow uploaded replays to appear in public search' option on the upload page. Uploads from anonymous users are always publicly searchable."
  q7: "What kind of analysis does {name} provide?"
  a7: "The short answer is, a lot, and a lot more is coming after this preview window. {name} can extract and analyze replays almost instantly to provide insights into build orders, spending, benchmark data, and player performance. The ORACLE feature uses machine-learning analysis to predict the most likely winners throughout the game so you can see where the tide turned."
  q8: "Can I download replays? What about replay packs?"
  a8: "You can download any publicly available replay file, or any file you have been linked to. Users with an account can currently create packs of zip files containing up to 20 replays."
  q9: "What should I expect from this preview version of {name}?"
  a9_p1: "This is a very early version of {name}, and it is absolutely broken in a number of ways. Please keep this in mind:"
  a9_li1: "You may encounter bugs, unexpected behavior, or crashes."
  a9_li2: "Data (including your uploaded replays or analysis results) may be lost or changed unexpectedly."
  a9_li3: "The platform is not expected to be 100% reliable or accurate. We appreciate your understanding and patience as we work to improve the platform! Your feedback during this phase is invaluable."
  q10: "Where do I share feedback or questions?"
  a10: "Feel free to check out our GitHub issues page or join our Discord community. You can find links to these in the top left of the page."
  q11: "What about other languages?"
  a11: "We want to launch in multiple languages, so stay tuned. If you speak Spanish, Chinese, or Korean, we could use your help with translations, so please stay in touch."
  q12: "Light mode?????"
  a12: Coming whenever I can make it look less bad.

