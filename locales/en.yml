# Navigation menu items
nav:
  upload: upload # Link to the upload page
  players: players # Link to the player search page
  replays: replays # Link to the replay search page
  myReplays: my replays # Link to the user's personal replays (only shown when logged in)
  faq: faq # Link to the FAQ page
  admin: admin # Link to the admin dashboard (only shown to admins)
  login: log in / sign up # Button to open login/signup panel
  logout: logout # Button to log out the current user

# Home page content
home:
  welcome: Welcome to {name}. # Main welcome message on the home page
  glad: We're glad you're here. # Sub-heading on the home page
  p1: '{name} is part of a suite of technologies under development by Stego Research
    to provide intelligent data insights to gamers, creators, tournament organizers,
    game developers, and more.' # First paragraph of home page description
  p2: We are taking advanced data extraction and processing techniques previously
    only available to major companies to provide insights into player behavior, game
    performance, and tournament outcomes to everyone. # Second paragraph
  p3: '{name} is currently available by special invitation only. Check back soon for
    more information.' # Third paragraph regarding availability
  footer: Stego Research # !! DON'T EDIT Signature in the footer of the home page

# Site header components
header:
  toggleTheme: 'Toggle theme: {theme}' # Tooltip for the theme toggle button
  bannerAlt: '{name} banner' # Alt text for the site's banner image

# Site-wide footer and server/session information modals
footer:
  privacy: privacy policy # Link to privacy policy (in footer and in modal)
  serverInfo: server info # Link to open server info modal (for admins)
  sessionInfo: session info # Link to open session info modal (for admins)
  jumpToTop: jump to top # Scroll to top of page link in footer
  serverInformation: Server information # Title of the server info modal (pop up)
  sessionInformation: Session information # Title of the session info modal (pop up)
  loading: Loading… # Loading state for modal (pop up) content
  version: version # Label for server version, for admins
  timestamp: timestamp # Label for server build timestamp, for admins
  environment: environment # Label for server environment (dev, pre, prod) (for admins)
  apiHost: api host # Label for API backend host (for admins)
  allowedOrigins: allowed origins # Label for CORS allowed origins (for admins)
  username: username # Label for current user's name in session info (for admins)
  role: role # Label for current user's role (for admins)
  assumeRole: assume role # Label for the role-switching feature (for admins)
  accessExpires: access expires # Label for access token expiration (for admins)
  refreshExpires: refresh expires # Label for refresh token expiration (for admins)
  close: Close # Button to close modals
  discord: community discord # Link to Discord join modal (pop up)
  joinDiscord: Join our Community Discord # Title of Discord join modal (pop up)
  discordBotProtection: Please click the button below to join our Discord server.
    In order to protect our community from bots, some users may be prompted to solve
    a captcha challenge. # Description for Discord bot protection
  join: Join # Button to join Discord after passing check
  joinCheckingBots: please wait - checking for bots # Message while validating captcha/bot status
  joinChallengeError: The bot-protection challenge failed to load. Please try again. # Error message for captcha failure
  retryChallenge: retry # Button to retry captcha
  joinError: Failed to join Discord. Please try again. # General error for Discord joining

# FAQ page content - all needs translation but will not have separate comments. 
faq:
  title: '{name} Technical Preview FAQ' # Main title of the FAQ page
  q1: What is {name}?
  a1: '{name} is a platform designed for managing and analyzing game replays. It allows
    you to upload your replays, view detailed statistics and insights, and search
    through a collection of games.'
  q2: What kind of replays does {name} support?
  a2: Currently, {name} only supports 1v1 StarCraft II replays from Legacy of the
    Void (ver. 5.0.0 and newer)
  q3: Is {name} free to use?
  a3_1: 'I won''t bury the lede: There will be paid options in the future. However,
    we hope to keep all of the core functionality that you see today in the preview
    phase free to use. Some of the most advanced features not yet available, as well
    as the ability to keep certain replays private, may be available only to paid
    users in the future. The reality is that the platform costs quite a bit to operate
    and took many moons to build, and we would rather not just rely on donations.'
  a3_2: We hope you enjoy the free features, and that you find the paid features well
    worth their cost when they arrive.
  q4: How do I use {name}? Do I need an account?
  a4: Yes, currently an account is required for any use of the {name} platform. Once
    you've been invited to join, you can upload your game replays, view their analyses,
    and explore all of the replays in our extensive data set.
  q5: How do I sign up for an account?
  a5: Right now, invites are going out on a very limited basis. We will have a semi-open
    alpha soon where you can register your interest, so stay tuned.
  q6: Can I keep my replays private?
  a6: During this preview phase, all replays you upload will be publicly searchable
    and analyzed. In the future, we will introduce more granular privacy options for
    users, allowing you to control who can view your replays.
  q7: What kind of analysis does {name} provide?
  a7: The short answer is, a lot - and way more is coming after this preview window.
    {name} can nearly instantly extract and analyze replays to provide insights on
    build orders, spending, benchmark data, and player performance. We want to give
    players, fans, and coaches next-level data analysis that will blow your mind.
  q8: Can I download replays? What about replay packs?
  a8: You can download any publicly available replay file, or any file you are linked
    to. Replay packs and sets are coming soon.
  q9: What should I expect from this preview version of {name}?
  a9_p1: 'This is a very early version of {name}, and it is absolutely broken in a
    number of ways. Please keep this in mind:'
  a9_li1: You may encounter bugs, unexpected behavior, or crashes.
  a9_li2: Data (including your uploaded replays or analysis results) may go missing
    or change unexpectedly.
  a9_li3: The platform is not expected to be 100% reliable or accurate. We appreciate
    your understanding and patience as we work to improve the platform! Your feedback
    during this phase is invaluable.
  q10: Where do I share feedback or questions?
  a10: Stay tuned for the launch of our Discord server and our public issue tracker
    once the beta is released.
  q11: What about other languages?
  a11: We want to launch in multiple languages, so stay tuned. If you speak Spanish,
    Chinese, or Korean we could use your help with translations, so please keep in
    touch.
  q12: Light mode?????
  a12: Coming whenever I can make it look less bad.

