# Home page content
home:
  welcome: Welcome to the {name} beta. # Main welcome message on the home page
  glad: It's more than just a replay manager. It's the world's most advanced platform for competitive SC2. # Sub-heading on the home page
  p1: '{name} is part of a suite of technologies under development by Stego Research to provide intelligent data insights to gamers, creators, tournament organizers, game developers, and more.' # First paragraph of home page description
  p2: "" # Removed
  p3: '{name} is currently in open beta. While the documentation and feature set are limited, we hope you enjoy exploring the platform and discovering all the powerful ways it can be used. I highly recommend joining our Discord community to get involved and provide feedback. You can find links to the Discord in the top left of the page.' # Third paragraph regarding availability
  p4: Now that our introduction is out of the way, go check out some replays! # Call to action at the end of the home page
  showReplaysCta: SHOW ME THE REPLAYS! # Home page CTA button label
  footer: Stego Research # !! DON'T EDIT Signature in the footer of the home page
  featuresTitle: Rank up with the most advanced SC2 technology on the internet.
  oracleTitle: ORACLE ML Predictions
  oracleP1: The world's most advanced StarCraft analysis. Our machine-learning models trained on over 40,000,000 game positions reveal new insights into subtle player advantages.
  oracleP2: Get instant outcome predictions at any point in time - all built with real ML inference, no BS.
  oracleCta: See ORACLE in Action
  promotionTitle: Global Player Rankings
  promotionP1: The original rankings site, upgraded. Track top players with trusted ratings from our sister site, {aligulac}.
  promotionCta: Browse the Leaderboard
  timeWarpTitle: High-Fidelity Minimap
  timeWarpP1: No more waiting for replays to fast-forward. Jump to any point in the game instantly and see exactly where every unit is with our deterministic engine.
  timeWarpCta: Try it yourself
  replaysTitle: Recent Replay Activity
  replaysP1: Explore the latest games from across the platform. Filter by player, race, or matchup to find exactly what you're looking for.
  replaysCta: Explore the Database


