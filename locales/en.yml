  replayList: Replay List # Title for the replay list tile
  date: DATE # Table column header
  map: MAP # Table column header
  players: PLAYERS # Table column header
  ver: VER # Table column header (game version)
  noReplays: No replays found. # Empty state message
  noPlayers: No players found. # Empty state message for player search
  downloadReplay: Download Replay # Tooltip for download button
