# Acknowledgements page content
acknowledgements:
  title: '{name} Acknowledgements' # Title of the acknowledgements page
  intro: "{name} couldn't exist without our contributors, amazing open source projects, and an incredibly supportive community. We especially want to thank:" # Introductory text for the acknowledgements page
  s2protTitle: icza / s2prot # Header for s2prot acknowledgement
  s2protBody: "s2prot by icza (Apache 2.0) was crucial as a foundation for the high-performance replay data extraction work in {name}." # Description of s2prot acknowledgement
  vueTitle: Vue.js and Vue-i18n # Header for frontend framework acknowledgement
  vueBody: Our frontend is powered by Vue.js and Vue-i18n (MIT License). # Description of Vue acknowledgement
  dataTitle: Valkey and PostgreSQL # Header for data stack acknowledgement
  dataBody: Thanks to the maintainers of the Valkey and PostgreSQL projects, whose work is the foundation of the data models and processing pipelines of {name}. # Description of Valkey/PostgreSQL acknowledgement
  goTitle: Go # Header for Go acknowledgement
  goBody: Go and its ecosystem make it practical to build the high-throughput replay processing and API services behind {name}. # Description of Go acknowledgement
  viteTitle: Vite # Header for Vite acknowledgement
  viteBody: Vite keeps the frontend build and development workflow fast enough that we can iterate quickly without losing our minds. # Description of Vite acknowledgement
  aligulacTitle: Aligulac # Header for Aligulac acknowledgement
  aligulacBody: Aligulac is used to serve live player ratings, greatly enhancing our ability to display useful information about players to our users. # Description of Aligulac acknowledgement
  usersTitle: Users and beta testers # Header for community acknowledgement
  usersBody: Most of all, thank you to everyone using {name} and to all of the beta testers whose honest feedback, bug reports, and patience keep making the project better. # Description of user acknowledgement
  closing: We appreciate every maintainer, contributor, and community member whose work makes projects like this possible. # Closing text for the acknowledgements page

# FAQ page content
faq:
  title: '{name} FAQ' # Main title of the FAQ page
  q1: What is {name}?
  a1: '{name} is a platform designed for managing and analyzing game replays. It allows
    you to upload your replays, view detailed statistics and insights, and search
    through a collection of games.'
  q2: What kind of replays does {name} support?
  a2: Currently, {name} only supports 1v1 StarCraft II replays from Legacy of the
    Void (ver. 5.0.0 and newer)
  q3: Is {name} free to use?
  a3_1: 'I won''t bury the lede: There will be paid options in the future. However,
    we hope to keep all of the core functionality that you see today in the preview
    phase free to use, though some features such as Oracle analysis and uploads may be
    subject to stricter limits. Some features that have not yet been announced will likely be
    available only to paid subscribers in the future. The reality is that the platform costs
    quite a bit to operate and took many moons to build, and we would rather not just rely on donations.'
  a3_2: We hope you enjoy the free features, and that you find the paid features well
    worth their cost when they arrive.
  q4: How do I use {name}? Do I need an account?
  a4: An account is not required to browse {name}. However, some features are strictly limited for anonymous users,
    such as replay uploads and downloads.
  q5: How do I sign up for an account?
  a5: Just hit the "log in / sign up" button - if you don't already have an account, you'll immediately be able to create
    one and sign in with just a code, no passwords here!
  q6: Can I keep my replays private?
  a6: If you have an account, you can control whether your uploads appear in public search results using the "Allow
    uploaded replays to appear in public searches" option on the upload page. Anonymous user uploads are always publicly searchable.
    "Hide from public search" checkbox. Anonymous users' uploads are always publicly searchable.
  q7: What kind of analysis does {name} provide?
  a7: The short answer is, a lot - and way more is coming after this preview window.
    {name} can nearly instantly extract and analyze replays to provide insights on
    build orders, spending, benchmark data, and player performance. The ORACLE feature uses machine learning analysis
    to predict the most likely winners all the way throughout the game so you can see where the tide turned. I hope you
    find the current tools useful and will check back soon for way more features (especially if you're interested in improving
    your game - there are some really exciting things in the pipeline!)
  q8: Can I download replays? What about replay packs?
  a8: You can download any publicly available replay file, or any file you are linked
    to. Users with an account can currently create zip file packs of up to 20 replays.
  q9: What should I expect from this preview version of {name}?
  a9_p1: 'This is a very early version of {name}, and it is absolutely broken in a
    number of ways. Please keep this in mind:'
  a9_li1: You may encounter bugs, unexpected behavior, or crashes.
  a9_li2: Data (including your uploaded replays or analysis results) may go missing
    or change unexpectedly.
  a9_li3: The platform is not expected to be 100% reliable or accurate. We appreciate
    your understanding and patience as we work to improve the platform! Your feedback
    during this phase is invaluable.
  q10: Where do I share feedback or questions?
  a10: Feel free to check out our GitHub issues page or join our Discord community. You can find links to these in the top left of the page.
  q11: What about other languages?
  a11: We want to launch in multiple languages, so stay tuned. If you speak Spanish,
    Chinese, or Korean we could use your help with translations, so please keep in
    touch.
  q12: Light mode?????
  a12: Coming whenever I can make it look less bad.

